name: Sync Fork\n\non:  \n  schedule:\n    - cron: '0 * * * *'  # Every hour\n  workflow_dispatch:\n\njobs:\n  sync:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v2\n        with:\n          repository: NousResearch/hermes-agent\n          path: upstream\n\n      - name: Sync Fork\n        run: |\n          git fetch upstream\n          git checkout main\n          git merge upstream/main\n          git push origin main\n\n      - name: Cleanup\n        run: rm -rf upstream